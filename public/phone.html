<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <title>Drone Controller</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: Inter, system-ui, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top left, #0a1530 0%, #03060f 40%, #020409 100%);
            color: #f7f9ff;
            overflow: auto;
        }

        #app {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .screen {
            width: min(100%, 980px);
            min-height: 620px;
            border-radius: 42px;
            background: rgba(10, 18, 40, 0.95);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 28px;
            display: grid;
            grid-template-columns: 1fr 1.1fr;
            gap: 24px;
        }

        .screen::before {
            content: '';
            position: absolute;
            top: 24px;
            left: 24px;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: rgba(16, 69, 122, 0.2);
            pointer-events: none;
        }

        .title {
            grid-column: 1 / -1;
            text-align: center;
            margin: 0 0 14px;
            font-size: clamp(2rem, 3vw, 2.6rem);
            letter-spacing: 0.03em;
        }

        .panel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 22px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 18px;
            position: relative;
            overflow: auto;
        }

        .panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(255, 255, 255, 0.02) 50%, transparent 100%);
            pointer-events: none;
        }

        .panel-title {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #d8e1ff;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.18em;
        }

        .slider-block,
        .joystick-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            height: 100%;
        }

        .slider-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
        }

        #heightSlider {
            writing-mode: vertical-lr;
            direction: rtl;
            appearance: none;
            -webkit-appearance: none;
            width: 24px;
            height: 90%;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            outline: none;
        }

        /* Track */
        #heightSlider::-webkit-slider-runnable-track {
            width: 100%;
            height: 100%;
            background: transparent;
            border-radius: 999px;
        }

        /* Thumb */
        #heightSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: #2ee78c;
            border: 2px solid rgba(255, 255, 255, 0.16);
            box-shadow: 0 0 20px rgba(46, 231, 140, 0.25);
            cursor: pointer;
        }

        /* Firefox */
        #heightSlider::-moz-range-track {
            background: transparent;
        }

        #heightSlider::-moz-range-thumb {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: #2ee78c;
            border: 2px solid rgba(255, 255, 255, 0.16);
            box-shadow: 0 0 20px rgba(46, 231, 140, 0.25);
            cursor: pointer;
        }

        /* Firefox */
        #heightSlider::-moz-range-track {
            background: transparent;
        }

        #heightSlider::-moz-range-thumb {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: #2ee78c;
            border: 2px solid rgba(255, 255, 255, 0.16);
            box-shadow: 0 0 20px rgba(46, 231, 140, 0.25);
            cursor: pointer;
        }

        .slider-value {
            color: #a7b4ff;
            font-size: 1.1rem;
            font-weight: 600;
            min-width: 80px;
            text-align: center;
        }

        .joystick-top {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #a7b4ff;
        }

        .joystick-top .icon {
            width: 32px;
            height: 32px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            background: rgba(46, 231, 140, 0.12);
            color: #2ee78c;
        }

        #joystick {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            background: radial-gradient(circle at center, rgba(46, 231, 140, 0.08) 0%, rgba(255, 255, 255, 0.04) 55%, rgba(255, 255, 255, 0.02) 100%);
            box-shadow: inset 0 0 35px rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #joystick::before {
            content: '';
            position: absolute;
            inset: 48px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .joystick-handle {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #2ee78c;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 30px rgba(46, 231, 140, 0.35);
        }

        .joystick-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
            gap: 12px;
            color: #d8e1ff;
            font-size: 0.95rem;
        }

        .joystick-stats span {
            display: inline-block;
            font-weight: 700;
            color: #ffffff;
        }

        @media (max-width: 880px) {
            .screen {
                grid-template-columns: 1fr;
                min-height: 740px;
            }

            .screen::before {
                display: none;
            }
        }

        @media (max-width: 640px) {
            #heightSlider {
                width: 100%;
                height: 18px;
                transform: none;
            }

            .slider-wrapper {
                flex-direction: column;
            }

            .slider-value {
                min-width: auto;
            }
        }
    </style>
</head>

<body>
    <div id="app">
        <section class="screen">
            <h1 class="title">Drone Controller</h1>

            <article class="panel slider-block">
                <div class="panel-title">Op/Neer</div>
                <div class="slider-wrapper">
                    <input type="range" id="heightSlider" min="-1" max="1" step="0.01" value="0">
                    <!-- <div class="slider-value"><span id="heightValue">0%</span></div> -->
                </div>
                <div style="color: #7f94c4; font-size: 0.95rem; text-align: center;">Gebruik de slider om de hoogte van
                    de drone te regelen.</div>
            </article>

            <article class="panel joystick-block">
                <div class="joystick-top">
                    <span class="icon">🧭</span>
                    <span>Alle</span>
                </div>
                <div id="joystick">
                    <div class="joystick-handle"></div>
                </div>
                <div class="joystick-stats">
                    <div>L/R: <span id="lrValue">0%</span></div>
                    <div>V/A: <span id="vaValue">0%</span></div>
                </div>
            </article>
        </section>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>
    <script>
        const ws = new WebSocket('ws://192.168.2.33:8080');
        let joystickX = 0, joystickY = 0, heightInput = 0;
        const lrValue = document.getElementById('lrValue');
        const vaValue = document.getElementById('vaValue');
        const heightValue = document.getElementById('heightValue');
        const joystickHandle = document.querySelector('.joystick-handle');
        const joystickElement = document.getElementById('joystick');

        // Verbeterde nipplejs-configuratie voor touchscreen
        const joystick = nipplejs.create({
            zone: joystickElement,
            mode: 'static',
            position: { left: '50%', top: '50%' },
            color: '#2ee78c',
            size: 120,
            restOpacity: 0.55,
            lockX: false,
            lockY: false,
            threshold: 0.1,
            fadeTime: 250,
            catchDistance: 200
        });

        // Direct touch handling voor betere responsiviteit
        function handleTouchInput(e) {
            const touch = e.touches[0] || e.changedTouches[0];
            const rect = joystickElement.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            const dx = touch.clientX - centerX;
            const dy = touch.clientY - centerY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const maxDistance = rect.width / 2;

            if (distance > 0) {
                joystickX = Math.max(-1, Math.min(1, dx / maxDistance));
                joystickY = Math.max(-1, Math.min(1, dy / maxDistance));

                const handleX = joystickX * (maxDistance * 0.6);
                const handleY = joystickY * (maxDistance * 0.6);
                joystickHandle.style.transform = `translate(calc(-50% + ${handleX}px), calc(-50% + ${handleY}px))`;
                updateStatus();
            }
        }

        function handleTouchEnd() {
            joystickX = 0;
            joystickY = 0;
            joystickHandle.style.transform = 'translate(-50%, -50%)';
            updateStatus();
        }

        // Touch event listeners
        joystickElement.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleTouchInput(e);
        });

        joystickElement.addEventListener('touchmove', (e) => {
            e.preventDefault();
            handleTouchInput(e);
        });

        joystickElement.addEventListener('touchend', (e) => {
            e.preventDefault();
            handleTouchEnd();
        });

        // Mouse fallback
        joystickElement.addEventListener('mousedown', () => {
            joystickElement.addEventListener('mousemove', handleTouchInput);
            joystickElement.addEventListener('mouseup', () => {
                joystickElement.removeEventListener('mousemove', handleTouchInput);
            });
        });


        function updateStatus() {
            // heightValue.textContent = `${Math.round(heightInput * 100)}%`;
            lrValue.textContent = `${Math.round(joystickX * 100)}%`;
            vaValue.textContent = `${Math.round(-joystickY * 100)}%`;
            console.log(ws.readyState)
            // console.log(`Updated Status - Throttle: ${heightInput.toFixed(2)}, Pitch: ${(-joystickY).toFixed(2)}, Roll: ${joystickX.toFixed(2)}`);
            if (ws.readyState === WebSocket.OPEN) {
                console.log(`Sending: Throttle=${heightInput.toFixed(2)}, Pitch=${(-joystickY).toFixed(2)}, Roll=${joystickX.toFixed(2)}`);
                ws.send(JSON.stringify({
                    type: "phone",                    throttle: heightInput,
                    pitch: -joystickY,
                    roll: joystickX
                }));
            }
        }

        joystick.on('move', (evt, data) => {
            joystickX = data.vector.x;
            joystickY = data.vector.y;
            const x = data.distance * data.vector.x;
            const y = data.distance * data.vector.y;
            joystickHandle.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
            updateStatus();
        });

        joystick.on('end', () => {
            joystickX = 0;
            joystickY = 0;
            joystickHandle.style.transform = 'translate(-50%, -50%)';
            updateStatus();
        });

        const slider = document.getElementById('heightSlider');
        slider.addEventListener('input', e => {
            heightInput = parseFloat(e.target.value);
            updateStatus();
        });

        ws.onopen = () => console.log("🟢 OPEN");
        ws.onclose = (e) => {
            console.log("🔴 CLOSED");
            console.log("Code:", e.code);
            console.log("Reason:", e.reason);
            console.log("Clean:", e.wasClean);
        };
        ws.onerror = (e) => {
            console.log("❌ ERROR", e);
        };
        ws.onerror = (err) => {
            console.log("❌ WebSocket error:", err);
        };

        updateStatus();
    </script>
</body>

</html>
