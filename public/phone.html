<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <title>Drone Controller</title>
    <link rel="stylesheet" href="assets/css/phone.css">
</head>

<body>
    <div id="app">
        <section class="screen">
            <h1 class="title">Drone Controller</h1>

            <!-- 🎮 PLAYER SELECT -->
            <!-- <article class="panel">
                <div class="panel-title">Speler</div>
                <select id="playerSelect">
                    <option value="1">Speler 1</option>
                    <option value="2">Speler 2</option>
                    <option value="3">Speler 3</option>
                    <option value="4">Speler 4</option>
                </select>
            </article> -->

            <!-- 🔼 HOOGTE -->
            <article class="panel slider-block">
                <div class="panel-title">Op / Neer</div>
                <div class="slider-wrapper">
                    <input type="range" id="heightSlider" min="-1" max="1" step="0.01" value="0">
                </div>
                <div style="color: #7f94c4; font-size: 0.95rem; text-align: center;">
                    Gebruik de slider om de hoogte te regelen
                </div>
            </article>

            <!-- 🕹️ JOYSTICK -->
            <article class="panel joystick-block">
                <div class="joystick-top">
                    <span>🧭</span>
                    <span>Besturing</span>
                </div>

                <div id="joystick">
                    <div class="joystick-handle"></div>
                </div>

                <div class="joystick-stats">
                    <div>L/R: <span id="lrValue">0%</span></div>
                    <div>V/A: <span id="vaValue">0%</span></div>
                </div>
            </article>
        </section>
    </div>

    <!-- joystick lib -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>

    <script>
        const ws = new WebSocket('ws://192.168.2.33:8080');

        let joystickX = 0;
        let joystickY = 0;
        let heightInput = 0;
        let playerId = null;

        ws.onopen = () => {
            console.log("🟢 Connected");

            ws.send(JSON.stringify({
                type: "join"
            }));
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);

            if (data.type === "assigned") {
                playerId = data.playerId;
                console.log("🎮 Assigned player:", playerId);
            }

            if (data.type === "full") {
                alert("Game is vol!");
            }
        };

        const lrValue = document.getElementById('lrValue');
        const vaValue = document.getElementById('vaValue');
        const joystickHandle = document.querySelector('.joystick-handle');
        const joystickElement = document.getElementById('joystick');
        // const playerSelect = document.getElementById('playerSelect');

        // 🎮 speler kiezen
        // playerSelect.addEventListener('change', (e) => {
        //     playerId = parseInt(e.target.value);
        //     console.log("🎮 Player gekozen:", playerId);
        // });

        // 🕹️ joystick
        const joystick = nipplejs.create({
            zone: joystickElement,
            mode: 'static',
            position: { left: '50%', top: '50%' },
            color: '#2ee78c',
            size: 120
        });

        joystick.on('move', (evt, data) => {
            joystickX = data.vector.x;
            joystickY = data.vector.y;

            const x = data.distance * data.vector.x;
            const y = data.distance * data.vector.y;

            joystickHandle.style.transform =
                `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;

            sendData();
        });

        joystick.on('end', () => {
            joystickX = 0;
            joystickY = 0;

            joystickHandle.style.transform = 'translate(-50%, -50%)';

            sendData();
        });

        // 🔼 slider
        const slider = document.getElementById('heightSlider');

        slider.addEventListener('input', e => {
            heightInput = parseFloat(e.target.value);
            sendData();
        });

        // 📡 send data
        function sendData() {
            if (!playerId) return; // 👈 wacht tot je ID hebt

            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: "phone",
                    playerId: playerId,
                    throttle: heightInput,
                    pitch: -joystickY,
                    roll: joystickX
                }));
            }
        }

        // 🔌 websocket events
        ws.onopen = () => {
            console.log("🟢 Connected");

            ws.send(JSON.stringify({
                type: "join"
            }));
        }; ws.onclose = () => console.log("🔴 Disconnected");
        ws.onerror = (err) => console.log("❌ WS error:", err);

        sendData();
    </script>
</body>

</html>
